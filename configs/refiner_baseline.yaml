data:
  raw_data_root: "/home/oussama/Desktop/MICCAI FRANCE/Learn2Breath_train_val_data"
  train_data_root: "/home/oussama/Desktop/MICCAI FRANCE/Learn2Breath_preprocessed"
  hu_min: -1000.0
  hu_max: 600.0
  foreground_threshold_hu: -995.0

model:
  base_channels: 8
  max_channels: 64
  predict: "svf"
  integration_steps: 7
  max_residual_voxels: 8.0
  input_channels: 5

loss:
  image: 1.0
  bending: 0.05
  jacobian: 1.0
  smooth: 0.0
  lncc_windows: [9, 15, 21]
  lncc_weights: [0.5, 0.3, 0.2]

train:
  output_dir: "outputs/refiner_baseline"
  epochs: 100
  batch_size: 1
  num_workers: 2
  lr: 0.0001
  weight_decay: 0.000001
  seed: 2026
  amp: true
  grad_clip: 1.0
  save_every: 10
  log_every: 1
  device: "cuda"

infer:
  checkpoint: "outputs/refiner_baseline/checkpoints/latest.pt"
  output_dir: "outputs/refiner_baseline_validation"
  make_zip: true
  overwrite: false
